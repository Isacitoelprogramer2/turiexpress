# Workflow: despliega Hosting y Functions a Firebase
# Proyecto: balance-food-landing
# URL provisional: https://turiexpress-site--balance-food-landing.web.app
name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Instalar dependencias de Cloud Functions
        run: cd functions && npm ci

      - name: Compilar Cloud Functions
        run: cd functions && npm run build

      - name: Desplegar Hosting y Cloud Functions
        run: firebase deploy --only hosting:turiexpress-site,functions:turiexpress
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
