# Workflow: despliega /public a Firebase Hosting en el sitio adicional turiexpress-site
# Proyecto: balance-food-landing
# URL provisional: https://turiexpress-site--balance-food-landing.web.app
name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Desplegar en Firebase Hosting
        run: firebase deploy --only hosting:turiexpress-site
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
