    <path d="M540 720 L520 680 L530 680 L515 640 L528 640 L520 610 L535 640 L548 640 L535 680 L545 680 Z"/>
    <path d="M1080 730 L1060 690 L1070 690 L1055 650 L1068 650 L1060 620 L1075 650 L1088 650 L1075 690 L1085 690 Z"/>
    <path d="M1320 720 L1300 680 L1310 680 L1295 640 L1308 640 L1300 610 L1315 640 L1328 640 L1315 680 L1325 680 Z"/>
