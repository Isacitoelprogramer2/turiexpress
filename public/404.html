<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — No encontramos esa ruta · Turiexpress</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: var(--white);
    }
    .error-page h1 {
      font-family: var(--font-display);
      font-size: clamp(5rem, 20vw, 10rem);
      line-height: 1;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .error-page h2 {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 1rem;
    }
    .error-page p { opacity: 0.9; margin-bottom: 2rem; max-width: 500px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <h1>404</h1>
      <h2>Esta ruta no existe</h2>
      <p>Parece que te saliste del mapa. Vuelve al inicio y descubre las experiencias que Turiexpress tiene para ti.</p>
      <a href="index.html" class="btn btn-primary btn-lg">Volver al inicio</a>
